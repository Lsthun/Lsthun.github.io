name: Update Events Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "15 11 1 * *"

permissions:
  contents: write

jobs:
  refresh-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install scraper dependencies
        run: pip install -r requirements-scraper.txt

      - name: Regenerate attractions feed
        run: python scripts/update_events_feed.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add attractions-feed.json attractions-feed.js
          git diff --cached --quiet && exit 0
          git commit -m "Update attractions feed"
          git push